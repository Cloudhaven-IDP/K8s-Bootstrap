githubConfigUrl: https://github.com/Cloudhaven-IDP

githubConfigSecret: github-app

controllerServiceAccount:
  namespace: arc
  name: arc-gha-rs-controller

minRunners: 0
maxRunners: 5

template:
  spec:
    imagePullSecrets:
      - name: ghcr-pull
    containers:
      - name: runner
        image: ghcr.io/cloudhaven-idp/gha-runner:placeholder
        imagePullPolicy: IfNotPresent
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
