githubConfigUrl: https://github.com/Cloudhaven-IDP

githubConfigSecret: github-app

minRunners: 1
maxRunners: 5

template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/cloudhaven-idp/gha-runner:placeholder
        imagePullPolicy: IfNotPresent
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
