apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: langfuse

resources:
  - namespace.yaml
  - external-secret.yaml
  - httproute.yaml

helmCharts:
  - name: langfuse
    repo: https://langfuse.github.io/langfuse-k8s
    version: 1.5.27
    releaseName: langfuse
    namespace: langfuse
    valuesFile: values.yaml
