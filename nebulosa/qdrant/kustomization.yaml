apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qdrant

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - external-secret.yaml

helmCharts:
  - name: qdrant
    repo: https://qdrant.github.io/qdrant-helm
    version: 1.17.1
    releaseName: qdrant
    namespace: qdrant
    valuesFile: values.yaml
