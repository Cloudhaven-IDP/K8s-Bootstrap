apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/envoyproxy/gateway/releases/download/v1.7.2/install.yaml
  - gatewayclass.yaml
  - gateway-internal.yaml
  - envoyproxy-internal.yaml
  - certificate.yaml

patches:
  - target:
      kind: Deployment
      name: envoy-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi

  - target:
      group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: ".*\\.gateway\\.networking\\.k8s\\.io"
    patch: |-
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: placeholder
