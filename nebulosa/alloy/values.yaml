controller:
  type: daemonset
  tolerations:
    - effect: NoSchedule
      operator: Exists
  volumes:
    extra:
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlogcontainers
        hostPath:
          path: /var/lib/docker/containers

alloy:
  mounts:
    extra:
      - name: varlogpods
        mountPath: /var/log/pods
        readOnly: true
      - name: varlogcontainers
        mountPath: /var/lib/docker/containers
        readOnly: true

  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          regex         = env("HOSTNAME")
          action        = "keep"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          regex         = "(.+)/(.*)"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1*/$2/*.log"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          target_label = "cluster"
          replacement  = "nebulosa"
        }
      }

      local.file_match "pods" {
        path_targets = discovery.relabel.pods.output
      }

      loki.source.file "pods" {
        targets               = local.file_match.pods.targets
        forward_to            = [loki.process.logs.receiver]
        legacy_positions_file = "/tmp/positions.yaml"
      }

      loki.process "logs" {
        stage.cri {}

        stage.label_drop {
          values = ["filename"]
        }

        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.events.receiver]
      }

      loki.process "events" {
        stage.static_labels {
          values = { cluster = "nebulosa" }
        }
        forward_to = [loki.write.default.receiver]
      }

      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.observability.svc.cluster.local:8080",
          job         = "kube-state-metrics",
        }]
        scrape_interval = "30s"
        forward_to      = [prometheus.remote_write.victoriametrics.receiver]
      }

      prometheus.remote_write "victoriametrics" {
        endpoint {
          url = "http://victoriametrics-placeholder.example.com/api/v1/write"
        }
      }

serviceAccount:
  create: true
  name: alloy-sa

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
