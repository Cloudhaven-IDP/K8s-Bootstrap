apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tailscale

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - secretstore.yaml
  - externalsecret.yaml

helmCharts:
  - name: tailscale-operator
    repo: https://pkgs.tailscale.com/helmcharts
    version: 1.80.0
    releaseName: tailscale-operator
    namespace: tailscale
    valuesFile: values.yaml
