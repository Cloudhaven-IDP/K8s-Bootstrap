apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: humboldt-internal
  namespace: envoy-gateway-system
spec:
  gatewayClassName: humboldt-envoy-gw
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: humboldt-internal
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
