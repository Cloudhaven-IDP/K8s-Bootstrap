apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: internal-gateway-cert
  namespace: envoy-gateway-system
spec:
  secretName: internal-gateway-cert-tls
  issuerRef:
    name: cloudflare-dns01
    kind: ClusterIssuer
  commonName: "*.internal.cloudhaven.work"
  dnsNames:
    - "*.internal.cloudhaven.work"
