apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

patches:
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: alloy
    patch: |-
      - op: add
        path: /metadata/namespace
        value: kube-system
  - target:
      version: v1
      kind: ConfigMap
      name: alloy
    patch: |-
      - op: add
        path: /metadata/namespace
        value: kube-system

resources:
  - nebulosa-gateway-egress.yaml

helmCharts:
  - name: alloy
    repo: https://grafana.github.io/helm-charts
    version: 0.12.0
    releaseName: alloy
    namespace: kube-system
    valuesFile: values.yaml
