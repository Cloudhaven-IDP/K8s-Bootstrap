apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: temporal-web
  namespace: temporal-system
spec:
  parentRefs:
    - name: humboldt-internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - temporal.internal.cloudhaven.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: temporal-web
          port: 8080
