apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: temporal-system

resources:
  - httproute.yaml
  - external-secret.yaml

helmCharts:
  - name: temporal
    repo: https://go.temporal.io/helm-charts
    version: 1.2.0
    releaseName: temporal
    namespace: temporal-system
    valuesFile: values.yaml
