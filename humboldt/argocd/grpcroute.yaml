apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: argocd-grpc
  namespace: argocd
spec:
  parentRefs:
    - name: humboldt-internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - argocd.internal.cloudhaven.work
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
